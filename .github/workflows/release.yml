name: Release

# Build installers for macOS, Windows and Linux (per-arch), sign + notarize the
# macOS artifacts, and attach everything to a GitHub Release. Triggered by
# pushing a tag like `v1.0.0`, or manually. The release is created as a draft and
# only published once every build has uploaded (the `publish` job).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      # Run targets one at a time: tauri-action's updater step reads the
      # release's latest.json, adds this job's signatures, then re-uploads it.
      # Concurrent jobs would clobber each other's entries.
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    # Stable, version-less asset names (e.g. Carrier_mac_arm.dmg) so the README
    # can point at persistent /releases/latest/download/ URLs.
    env:
      ASSET_PLATFORM: ${{ contains(matrix.target, 'apple-darwin') && 'mac' || contains(matrix.target, 'windows') && 'win' || 'lin' }}
      ASSET_ARCH: ${{ startsWith(matrix.target, 'aarch64') && 'arm' || 'x64' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (required for auto-update artifacts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization of the .app (only used if set).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Carrier ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below."
          releaseDraft: true
          prerelease: false
          # Version-less, stable names so the README can link persistent
          # /releases/latest/download/ URLs that never need a per-release edit.
          assetNamePattern: "Carrier_${{ env.ASSET_PLATFORM }}_${{ env.ASSET_ARCH }}[_setup][ext]"
          # The release config enables createUpdaterArtifacts (kept out of the
          # base config so a local `tauri build` doesn't require the signing key).
          args: --target ${{ matrix.target }} --config src-tauri/tauri.conf.release.json

      # tauri-action notarizes the .app but not the .dmg, so a downloaded .dmg
      # would still prompt. Notarize + staple it and re-upload under the same
      # stable name.
      - name: Notarize + staple the .dmg
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID}" ] || [ -z "${APPLE_PASSWORD}" ] || [ -z "${APPLE_TEAM_ID}" ]; then
            # A tagged release promises a signed, notarized download — fail rather
            # than publish an unsigned/unstapled .dmg. Manual (workflow_dispatch)
            # runs may still skip when the secrets aren't configured.
            if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
              echo "Missing Apple notarization secrets for a tagged release." >&2
              exit 1
            fi
            echo "No Apple credentials configured — skipping .dmg notarization."
            exit 0
          fi
          SRC=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -name '*.dmg' | head -1)
          if [ -z "${SRC}" ]; then echo "No .dmg found."; exit 0; fi
          xcrun notarytool submit "${SRC}" --apple-id "${APPLE_ID}" --password "${APPLE_PASSWORD}" --team-id "${APPLE_TEAM_ID}" --wait
          xcrun stapler staple "${SRC}"
          DEST="Carrier_${ASSET_PLATFORM}_${ASSET_ARCH}.dmg"
          cp "${SRC}" "${DEST}"
          gh release upload "${{ github.ref_name }}" "${DEST}" --clobber

  # Flip the draft to public only after every build has uploaded its assets.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
