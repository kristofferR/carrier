<!doctype html>
<html lang="en" data-window="settings">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrier Settings</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #ffffff; color: #1c1e21;
        display: flex; flex-direction: column;
      }
      /* Tab strip pinned to the top — stacked icon + label, like IPTVChecker.
         `main` is the only scroll container (flex:1 + overflow), so the strip
         already stays put; `flex:0 0 auto` (never shrink) plus a sticky, opaque
         background make that pinning explicit and robust to layout changes. */
      .tabs {
        position: sticky; top: 0; z-index: 1; flex: 0 0 auto;
        display: flex; gap: 6px; justify-content: center;
        padding: 12px 12px 10px;
        background: #ffffff; border-bottom: 1px solid #e4e6eb;
      }
      .tab {
        flex: 1 1 0; min-width: 0;
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        padding: 9px 4px; border-radius: 10px;
        background: transparent; border: 0; cursor: pointer;
        color: #65676b; font: inherit; font-size: 11px; font-weight: 500;
      }
      .tab .lbl { max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .tab svg { width: 22px; height: 22px; }
      .tab:hover { background: #f0f2f5; color: #1c1e21; }
      .tab.active { background: #e7f0ff; color: #0866ff; }
      .tab.active svg { stroke-width: 1.9; }
      main { flex: 1; overflow-y: auto; padding: 6px 10px; }
      .row {
        display: flex; align-items: flex-start; gap: 12px;
        padding: 12px; border-radius: 8px; cursor: pointer;
      }
      .row:hover { background: #f0f2f5; }
      .row input { margin-top: 2px; width: 16px; height: 16px; }
      .label { font-weight: 500; }
      .hint { color: #65676b; font-size: 12px; margin-top: 2px; }
      footer {
        padding: 12px 20px; border-top: 1px solid #e4e6eb;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      button.action {
        background: #0866ff; color: #fff; border: 0; border-radius: 8px;
        padding: 9px 16px; font: inherit; font-weight: 600; cursor: pointer;
      }
      button.action:active { opacity: .85; }
      .ver { opacity: .55; font-size: 12px; }
      #status { opacity: .7; font-size: 12px; min-height: 16px; }
      @media (prefers-color-scheme: dark) {
        body { background: #242526; color: #e4e6eb; }
        .row:hover { background: #3a3b3c; }
        .tabs { background: #242526; }
        .tabs, footer { border-color: #3a3b3c; }
        .hint { color: #b0b3b8; }
        .tab { color: #b0b3b8; }
        .tab:hover { background: #3a3b3c; color: #e4e6eb; }
        .tab.active { background: #263a59; color: #5b9bff; }
      }
    </style>
  </head>
  <body>
    <nav class="tabs" id="tabs" role="tablist" aria-label="Settings sections"></nav>
    <main id="rows" role="tabpanel"></main>
    <footer>
      <div>
        <div class="ver" id="version">Carrier</div>
        <div id="status"></div>
        <a href="#" id="reset" style="font-size:12px;opacity:.7">Reset to defaults</a>
      </div>
      <button class="action" id="check">Check for updates</button>
    </footer>

    <script>
      const invoke = (cmd, args) => window.__TAURI_INTERNALS__.invoke(cmd, args);

      // Per-field metadata: [key, label, hint]. Grouping into tabs is below.
      const FIELDS = [
        ["always_on_top", "Always on Top", "Keep the window above other apps."],
        ["show_tray", "Show System Tray", "Show a Carrier icon in the system tray."],
        ["start_to_tray", "Start to Tray", "Launch hidden, into the tray."],
        ["autostart", "Start on System Startup", "Launch Carrier when you log in."],
        ["hide_on_close", "Hide on Close", "Closing the window hides it instead of quitting."],
        ["unread_badge", "Unread Badge", "Show the unread count on the Dock / taskbar icon."],
        ["mute_notifications", "Mute Notifications", "Don't show desktop notifications for new messages."],
        ["hide_notification_preview", "Hide Message Preview", "Notify without the sender name or message text."],
        ["hide_names_avatars", "Hide Names & Avatars", "Blur contact names and avatars in the conversation list (Cmd/Ctrl+Shift+N)."],
        ["system_emoji", "System Emoji", "Render emoji with your system's emoji font instead of Facebook's."],
        ["menu_bar_only", "Menu Bar Only", "macOS: hide the Dock icon and live in the menu bar (needs the tray)."],
        ["spellcheck", "Spell check", "Underline misspelled words while typing (applies on reload)."],
        ["multi_instance", "Multi Instance", "Allow more than one window (experimental, needs restart)."],
      ];
      const FIELD_META = Object.fromEntries(FIELDS.map(([k, label, hint]) => [k, { label, hint }]));

      // Inline lucide-style icons (no dependency / build step). `theme` lives in General.
      const ICONS = {
        general:
          '<line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/>',
        tray: '<path d="M12 2v10"/><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>',
        notifications:
          '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
        advanced:
          '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
      };

      const TABS = [
        { id: "general", label: "General", icon: ICONS.general,
          fields: ["theme", "hide_names_avatars", "system_emoji", "always_on_top", "hide_on_close", "spellcheck"] },
        { id: "tray", label: "Tray & Startup", icon: ICONS.tray,
          fields: ["show_tray", "start_to_tray", "autostart", "menu_bar_only"] },
        { id: "notifications", label: "Notifications", icon: ICONS.notifications,
          fields: ["mute_notifications", "hide_notification_preview", "unread_badge", "badge_mode"] },
        { id: "advanced", label: "Advanced", icon: ICONS.advanced,
          fields: ["multi_instance"] },
      ];

      let activeTab = "general";
      try {
        const saved = localStorage.getItem("carrier:settingsTab");
        if (saved && TABS.some((t) => t.id === saved)) activeTab = saved;
      } catch (_) {}

      let settings = {};
      const setStatus = (m) => (document.getElementById("status").textContent = m || "");

      function svgIcon(inner) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("fill", "none");
        svg.setAttribute("stroke", "currentColor");
        svg.setAttribute("stroke-width", "1.6");
        svg.setAttribute("stroke-linecap", "round");
        svg.setAttribute("stroke-linejoin", "round");
        svg.setAttribute("aria-hidden", "true");
        svg.innerHTML = inner;
        return svg;
      }

      async function refresh() {
        try {
          settings = await invoke("get_settings");
          render();
        } catch (e) {
          console.error(e);
        }
      }

      async function persist(key, value) {
        try {
          // Re-read first so we don't clobber a change made elsewhere (e.g.
          // View → Toggle Always on Top) with a stale snapshot.
          const fresh = await invoke("get_settings");
          fresh[key] = value;
          settings = await invoke("set_settings", { new: fresh });
          render();
          setStatus("Saved.");
          setTimeout(() => setStatus(""), 1200);
        } catch (e) {
          // Surface the real reason (e.g. autostart registration failed) and
          // re-sync the checkboxes with what was actually persisted.
          setStatus(String(e && e.message ? e.message : e));
          console.error(e);
          await refresh();
        }
      }

      // Build a <select> row bound to a string setting.
      function selectRow(key, fallback, options, label, hint, disabled) {
        const row = document.createElement("label");
        row.className = "row";
        const sel = document.createElement("select");
        for (const [val, txt] of options) {
          const o = document.createElement("option");
          o.value = val;
          o.textContent = txt;
          if ((settings[key] || fallback) === val) o.selected = true;
          sel.appendChild(o);
        }
        sel.disabled = !!disabled;
        sel.onchange = () => persist(key, sel.value);
        const text = document.createElement("div");
        text.innerHTML = `<div class="label">${label}</div><div class="hint">${hint}</div>`;
        row.append(sel, text);
        return row;
      }

      function themeRow() {
        return selectRow(
          "theme", "system",
          [["system", "System"], ["light", "Light"], ["dark", "Dark"]],
          "Theme", "Force the Messenger theme, or follow your system.",
          false,
        );
      }

      // Badge counts mode — only meaningful while the unread badge is on.
      function badgeModeRow() {
        return selectRow(
          "badge_mode", "messages",
          [["messages", "Unread messages"], ["conversations", "Unread conversations"]],
          "Badge counts", "Whether the badge shows unread messages or unread conversations.",
          !settings.unread_badge,
        );
      }

      function checkboxRow(key) {
        const meta = FIELD_META[key];
        const row = document.createElement("label");
        row.className = "row";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!settings[key];
        cb.onchange = () => persist(key, cb.checked);
        const text = document.createElement("div");
        text.innerHTML = `<div class="label">${meta.label}</div><div class="hint">${meta.hint}</div>`;
        row.append(cb, text);
        return row;
      }

      // Switch to a tab (no-op re-render if already active) and, when asked,
      // move focus to its button — used by keyboard nav so focus follows the
      // selection across the re-render that rebuilds the buttons.
      function selectTab(id, focus) {
        if (id !== activeTab) {
          activeTab = id;
          try {
            localStorage.setItem("carrier:settingsTab", id);
          } catch (_) {}
          render();
        }
        if (focus) {
          const el = document.getElementById("tab-" + id);
          if (el) el.focus();
        }
      }

      // ARIA tablist keyboard support: Left/Right move between tabs (wrapping),
      // Home/End jump to the first/last. Activation follows focus (automatic
      // activation — switching panels is cheap). Other keys fall through.
      function onTabKeydown(e, id) {
        const i = TABS.findIndex((t) => t.id === id);
        if (i < 0) return;
        let j = null;
        if (e.key === "ArrowRight") j = (i + 1) % TABS.length;
        else if (e.key === "ArrowLeft") j = (i - 1 + TABS.length) % TABS.length;
        else if (e.key === "Home") j = 0;
        else if (e.key === "End") j = TABS.length - 1;
        if (j === null) return;
        e.preventDefault();
        selectTab(TABS[j].id, true);
      }

      function renderTabs() {
        const nav = document.getElementById("tabs");
        nav.innerHTML = "";
        for (const t of TABS) {
          const active = t.id === activeTab;
          const b = document.createElement("button");
          b.type = "button";
          b.className = "tab" + (active ? " active" : "");
          b.id = "tab-" + t.id;
          b.setAttribute("role", "tab");
          b.setAttribute("aria-selected", String(active));
          b.setAttribute("aria-controls", "rows");
          // Roving tabindex: only the active tab is in the Tab order; the arrow
          // keys move focus among the rest.
          b.tabIndex = active ? 0 : -1;
          b.appendChild(svgIcon(t.icon));
          const lbl = document.createElement("span");
          lbl.className = "lbl";
          lbl.textContent = t.label;
          b.appendChild(lbl);
          b.onclick = () => selectTab(t.id, false);
          b.onkeydown = (e) => onTabKeydown(e, t.id);
          nav.appendChild(b);
        }
        // The single shared panel is labelled by whichever tab is selected.
        document.getElementById("rows").setAttribute("aria-labelledby", "tab-" + activeTab);
      }

      // Pseudo-fields ("theme", "badge_mode") are <select> rows; everything else is a checkbox.
      const CUSTOM_ROWS = { theme: themeRow, badge_mode: badgeModeRow };

      function renderBody() {
        const root = document.getElementById("rows");
        root.innerHTML = "";
        const tab = TABS.find((t) => t.id === activeTab) || TABS[0];
        for (const key of tab.fields) {
          const build = CUSTOM_ROWS[key];
          root.appendChild(build ? build() : checkboxRow(key));
        }
      }

      function render() {
        renderTabs();
        renderBody();
      }

      document.getElementById("reset").onclick = async (e) => {
        e.preventDefault();
        try {
          settings = await invoke("reset_settings");
          render();
          setStatus("Reset to defaults.");
          setTimeout(() => setStatus(""), 1200);
        } catch (err) {
          setStatus(String(err && err.message ? err.message : err));
          console.error(err);
          await refresh();
        }
      };

      // Pick up changes made elsewhere (e.g. the View menu) when refocused.
      window.addEventListener("focus", refresh);

      document.getElementById("check").onclick = async () => {
        setStatus("Checking for updates…");
        try {
          const res = await invoke("check_for_updates");
          setStatus(res === "up-to-date" ? "Carrier is up to date." : "Updating…");
        } catch (e) {
          setStatus("Update check failed.");
          console.error(e);
        }
      };

      (async () => {
        try {
          settings = await invoke("get_settings");
        } catch (e) {
          console.error(e);
        }
        render();
        try {
          const v = await invoke("plugin:app|version");
          document.getElementById("version").textContent = "Carrier " + v;
        } catch (_) {}
      })();
    </script>
  </body>
</html>
