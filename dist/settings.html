<!doctype html>
<html lang="en" data-window="settings">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrier Settings</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #ffffff; color: #1c1e21;
        display: flex; flex-direction: column;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #242526; color: #e4e6eb; }
        .row:hover { background: #3a3b3c; }
        header, footer { border-color: #3a3b3c; }
        .hint { color: #b0b3b8; }
      }
      header {
        padding: 16px 20px; font-size: 16px; font-weight: 600;
        border-bottom: 1px solid #e4e6eb;
      }
      main { flex: 1; overflow-y: auto; padding: 6px 10px; }
      .row {
        display: flex; align-items: flex-start; gap: 12px;
        padding: 12px; border-radius: 8px; cursor: pointer;
      }
      .row:hover { background: #f0f2f5; }
      .row input { margin-top: 2px; width: 16px; height: 16px; }
      .label { font-weight: 500; }
      .hint { color: #65676b; font-size: 12px; margin-top: 2px; }
      footer {
        padding: 12px 20px; border-top: 1px solid #e4e6eb;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      button {
        background: #0866ff; color: #fff; border: 0; border-radius: 8px;
        padding: 9px 16px; font: inherit; font-weight: 600; cursor: pointer;
      }
      button:active { opacity: .85; }
      .ver { opacity: .55; font-size: 12px; }
      #status { opacity: .7; font-size: 12px; min-height: 16px; }
    </style>
  </head>
  <body>
    <header>Carrier settings</header>
    <main id="rows"></main>
    <footer>
      <div>
        <div class="ver" id="version">Carrier</div>
        <div id="status"></div>
        <a href="#" id="reset" style="font-size:12px;opacity:.7">Reset to defaults</a>
      </div>
      <button id="check">Check for updates</button>
    </footer>

    <script>
      const invoke = (cmd, args) => window.__TAURI__.core.invoke(cmd, args);
      const FIELDS = [
        ["always_on_top", "Always on Top", "Keep the window above other apps."],
        ["show_tray", "Show System Tray", "Show a Carrier icon in the system tray."],
        ["start_to_tray", "Start to Tray", "Launch hidden, into the tray."],
        ["autostart", "Start on System Startup", "Launch Carrier when you log in."],
        ["hide_on_close", "Hide on Close", "Closing the window hides it instead of quitting."],
        ["spellcheck", "Spell check", "Underline misspelled words while typing (applies on reload)."],
        ["multi_instance", "Multi Instance", "Allow more than one window (experimental, needs restart)."],
      ];

      let settings = {};
      const setStatus = (m) => (document.getElementById("status").textContent = m || "");

      async function refresh() {
        try {
          settings = await invoke("get_settings");
          render();
        } catch (e) {
          console.error(e);
        }
      }

      async function persist(key, value) {
        try {
          // Re-read first so we don't clobber a change made elsewhere (e.g.
          // View → Toggle Always on Top) with a stale snapshot.
          const fresh = await invoke("get_settings");
          fresh[key] = value;
          settings = await invoke("set_settings", { new: fresh });
          render();
          setStatus("Saved.");
          setTimeout(() => setStatus(""), 1200);
        } catch (e) {
          // Surface the real reason (e.g. autostart registration failed) and
          // re-sync the checkboxes with what was actually persisted.
          setStatus(String(e && e.message ? e.message : e));
          console.error(e);
          await refresh();
        }
      }

      function render() {
        const root = document.getElementById("rows");
        root.innerHTML = "";
        for (const [key, label, hint] of FIELDS) {
          const row = document.createElement("label");
          row.className = "row";
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = !!settings[key];
          cb.onchange = () => persist(key, cb.checked);
          const text = document.createElement("div");
          text.innerHTML = `<div class="label">${label}</div><div class="hint">${hint}</div>`;
          row.append(cb, text);
          root.appendChild(row);
        }
      }

      document.getElementById("reset").onclick = async (e) => {
        e.preventDefault();
        try {
          settings = await invoke("reset_settings");
          render();
          setStatus("Reset to defaults.");
          setTimeout(() => setStatus(""), 1200);
        } catch (err) {
          setStatus(String(err && err.message ? err.message : err));
          console.error(err);
          await refresh();
        }
      };

      // Pick up changes made elsewhere (e.g. the View menu) when refocused.
      window.addEventListener("focus", refresh);

      document.getElementById("check").onclick = async () => {
        setStatus("Checking for updates…");
        try {
          const res = await invoke("check_for_updates");
          setStatus(res === "up-to-date" ? "Carrier is up to date." : "Updating…");
        } catch (e) {
          setStatus("Update check failed.");
          console.error(e);
        }
      };

      (async () => {
        try {
          settings = await invoke("get_settings");
        } catch (e) {
          console.error(e);
        }
        render();
        try {
          const v = await invoke("plugin:app|version");
          document.getElementById("version").textContent = "Carrier " + v;
        } catch (_) {}
      })();
    </script>
  </body>
</html>
